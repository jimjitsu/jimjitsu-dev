version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch routine dev-dependency bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: "development"
    ignore:
      # Storybook 10's addon constraints are documented in CLAUDE.md; bump these
      # deliberately, not via automated PRs.
      - dependency-name: "storybook"
      - dependency-name: "@storybook/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
